name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: anihub-cli-x86_64-unknown-linux-gnu
            platform: unix
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            asset: anihub-cli-x86_64-pc-windows-msvc.exe
            platform: windows
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            asset: anihub-cli-x86_64-apple-darwin
            platform: unix
          - runner: macos-15
            target: aarch64-apple-darwin
            asset: anihub-cli-aarch64-apple-darwin
            platform: unix

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build locked release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Stage Unix binary
        if: matrix.platform == 'unix'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/anihub-cli" "dist/${{ matrix.asset }}"

      - name: Stage Windows binary
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/anihub-cli.exe" "dist/${{ matrix.asset }}"

      - name: Upload staged binary
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish:
    name: Publish release and checksums
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release binaries
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Create SHA-256 manifest
        working-directory: dist
        run: sha256sum anihub-cli-* > SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: dist/*
